<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Image for Scam Detection</title>
</head>
<body>
  <h1>Upload Image</h1>
  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" id="image" name="image" accept="image/*" required>
    <button type="submit">Upload</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData();
      formData.append("image", document.getElementById("image").files[0]);

      try {
        const res = await fetch("http://localhost:3600/upload", {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        document.getElementById("result").innerHTML = `
          <p><b>Extracted Text:</b> ${data.text}</p>
          <p><b>AI Result:</b> ${data.aiResult}</p>
        `;
      } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "❌ Error uploading image.";
      }
    });
  </script>
</body>
</html>
