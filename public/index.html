<!DOCTYPE html>
<html>
<head>
  <title>AI Scam Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛡 AI Scam Detector</h1>
  <p>Detect scam messages using AI + ML</p>
</header>

<main class="container">

  <!-- INPUT CARD -->
  <form id="fraudForm" class="card">
    <textarea 
      id="message" 
      placeholder="Paste WhatsApp, Email, or SMS message here..."
      required
    ></textarea>

    <button type="submit">🚀 Check Scam</button>
  </form>

  <!-- RESULT CARD -->
  <div id="result" class="result-card"></div>

  <!-- HISTORY SECTION -->
  <div class="history-section">
    <button onclick="showHistory()">📜 View History</button>
    <div id="history"></div>
  </div>

</main>

<footer>
  <p>⚡ Powered by AI + Machine Learning</p>
</footer>

<script src="script.js"></script>

</body>
</html>
